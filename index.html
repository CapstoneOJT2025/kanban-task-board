<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro — Kanban Task Board</title>
  <meta name="description" content="TaskFlow Pro — a premium dark-mode Kanban board for managing tasks across Backlog, To Do, In Progress and Done." />

  <!-- Google Fonts: Inter for UI text, Lexend for display/headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================= -->
  <!-- TOP NAVIGATION                                 -->
  <!-- ============================================= -->
  <header class="topbar">
    <div class="topbar__left">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="18" rx="2" fill="currentColor" opacity="0.95"/>
            <rect x="14" y="3" width="7" height="11" rx="2" fill="currentColor" opacity="0.55"/>
          </svg>
        </span>
        <span class="brand__name">TaskFlow <span class="brand__pro">Pro</span></span>
      </div>
    </div>

    <div class="topbar__center">
      <div class="search-bar">
        <svg class="search-bar__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-bar__input"
          placeholder="Search tasks by title or description…"
          aria-label="Search tasks"
          autocomplete="off"
        />
        <button class="search-bar__clear" id="searchClearBtn" type="button" aria-label="Clear search" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="topbar__right">
      <button class="btn btn--primary" id="addTaskBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        New Task
      </button>
    </div>
  </header>

  <main class="app">

    <!-- ============================================= -->
    <!-- DASHBOARD ANALYTICS                            -->
    <!-- ============================================= -->
    <section class="dashboard" aria-label="Task analytics overview">
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--total" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="stat-card__body">
          <span class="stat-card__label">Total Tasks</span>
          <span class="stat-card__value" id="statTotal">0</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--done" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 4 12 14.01l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="stat-card__body">
          <span class="stat-card__label">Completed</span>
          <span class="stat-card__value" id="statCompleted">0</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--pending" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="stat-card__body">
          <span class="stat-card__label">Pending</span>
          <span class="stat-card__value" id="statPending">0</span>
        </div>
      </div>

      <div class="stat-card stat-card--rate">
        <div class="stat-card__top">
          <div class="stat-card__icon stat-card__icon--rate" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 3v18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="m19 9-5 5-4-4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="stat-card__body">
            <span class="stat-card__label">Completion Rate</span>
            <span class="stat-card__value" id="statRate">0%</span>
          </div>
        </div>
        <div class="progress-bar" role="progressbar" aria-label="Overall completion rate" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
          <div class="progress-bar__fill" id="progressBarFill"></div>
        </div>
      </div>
    </section>

    <!-- ============================================= -->
    <!-- FILTER TOOLBAR                                 -->
    <!-- ============================================= -->
    <section class="toolbar" aria-label="Filter tasks">
      <div class="toolbar__group">
        <label class="toolbar__label" for="priorityFilter">Priority</label>
        <div class="select-wrap">
          <select id="priorityFilter" class="select">
            <option value="all">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <svg class="select-wrap__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <div class="toolbar__group">
        <label class="toolbar__label" for="categoryFilter">Category</label>
        <div class="select-wrap">
          <select id="categoryFilter" class="select">
            <option value="all">All categories</option>
          </select>
          <svg class="select-wrap__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <button class="btn btn--ghost" id="clearFiltersBtn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Clear filters
      </button>

      <div class="toolbar__spacer"></div>

      <span class="toolbar__hint" id="resultsHint" aria-live="polite"></span>
    </section>

    <!-- ============================================= -->
    <!-- KANBAN BOARD                                   -->
    <!-- ============================================= -->
    <section class="board" id="board" aria-label="Kanban board">

      <!-- Column: Backlog -->
      <div class="column" data-status="backlog">
        <div class="column__header">
          <div class="column__title-group">
            <span class="column__dot column__dot--backlog" aria-hidden="true"></span>
            <h2 class="column__title">Backlog</h2>
            <span class="column__count" id="countBacklog">0</span>
          </div>
          <button class="column__add-btn" data-status="backlog" type="button" aria-label="Add task to Backlog">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="column__list" id="list-backlog" data-status="backlog"></div>
      </div>

      <!-- Column: To Do -->
      <div class="column" data-status="todo">
        <div class="column__header">
          <div class="column__title-group">
            <span class="column__dot column__dot--todo" aria-hidden="true"></span>
            <h2 class="column__title">To Do</h2>
            <span class="column__count" id="countTodo">0</span>
          </div>
          <button class="column__add-btn" data-status="todo" type="button" aria-label="Add task to To Do">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="column__list" id="list-todo" data-status="todo"></div>
      </div>

      <!-- Column: In Progress -->
      <div class="column" data-status="inprogress">
        <div class="column__header">
          <div class="column__title-group">
            <span class="column__dot column__dot--inprogress" aria-hidden="true"></span>
            <h2 class="column__title">In Progress</h2>
            <span class="column__count" id="countInprogress">0</span>
          </div>
          <button class="column__add-btn" data-status="inprogress" type="button" aria-label="Add task to In Progress">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="column__list" id="list-inprogress" data-status="inprogress"></div>
      </div>

      <!-- Column: Done -->
      <div class="column" data-status="done">
        <div class="column__header">
          <div class="column__title-group">
            <span class="column__dot column__dot--done" aria-hidden="true"></span>
            <h2 class="column__title">Done</h2>
            <span class="column__count" id="countDone">0</span>
          </div>
          <button class="column__add-btn" data-status="done" type="button" aria-label="Add task to Done">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="column__list" id="list-done" data-status="done"></div>
      </div>

    </section>
  </main>

  <!-- ============================================= -->
  <!-- TASK MODAL (Create / Edit)                     -->
  <!-- ============================================= -->
  <div class="modal-overlay" id="taskModalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <form id="taskForm" novalidate>
        <div class="modal__header">
          <h2 class="modal__title" id="modalTitle">New Task</h2>
          <button type="button" class="modal__close" id="modalCloseBtn" aria-label="Close dialog">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="modal__body">
          <input type="hidden" id="taskId" />

          <div class="field">
            <label class="field__label" for="taskTitle">Title <span class="field__required">*</span></label>
            <input type="text" id="taskTitle" class="field__input" placeholder="e.g. Design onboarding flow" maxlength="80" required />
            <span class="field__error" id="titleError">Title is required</span>
          </div>

          <div class="field">
            <label class="field__label" for="taskDescription">Description</label>
            <textarea id="taskDescription" class="field__input field__textarea" placeholder="Add more detail about this task…" maxlength="500" rows="3"></textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field__label" for="taskPriority">Priority</label>
              <div class="select-wrap select-wrap--full">
                <select id="taskPriority" class="select">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
                <svg class="select-wrap__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="taskDueDate">Due date</label>
              <input type="date" id="taskDueDate" class="field__input" />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field__label" for="taskCategory">Category</label>
              <input type="text" id="taskCategory" class="field__input" placeholder="e.g. Design, Engineering, Marketing" list="categorySuggestions" maxlength="30" />
              <datalist id="categorySuggestions"></datalist>
            </div>

            <div class="field">
              <label class="field__label" for="taskStatus">Status</label>
              <div class="select-wrap select-wrap--full">
                <select id="taskStatus" class="select">
                  <option value="backlog">Backlog</option>
                  <option value="todo">To Do</option>
                  <option value="inprogress">In Progress</option>
                  <option value="done">Done</option>
                </select>
                <svg class="select-wrap__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>
          </div>
        </div>

        <div class="modal__footer">
          <button type="button" class="btn btn--danger-ghost" id="deleteTaskBtn" hidden>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Delete
          </button>
          <div class="modal__footer-spacer"></div>
          <button type="button" class="btn btn--ghost" id="cancelTaskBtn">Cancel</button>
          <button type="submit" class="btn btn--primary" id="saveTaskBtn">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- DELETE CONFIRMATION MODAL                      -->
  <!-- ============================================= -->
  <div class="modal-overlay" id="confirmModalOverlay" hidden>
    <div class="modal modal--small" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal__body modal__body--confirm">
        <div class="confirm-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2 class="modal__title" id="confirmTitle">Delete this task?</h2>
        <p class="confirm-text">This action can't be undone. The task will be permanently removed from your board.</p>
      </div>
      <div class="modal__footer">
        <div class="modal__footer-spacer"></div>
        <button type="button" class="btn btn--ghost" id="confirmCancelBtn">Cancel</button>
        <button type="button" class="btn btn--danger" id="confirmDeleteBtn">Delete Task</button>
      </div>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- TOAST NOTIFICATION CONTAINER                   -->
  <!-- ============================================= -->
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="JS/data.js"></script>
  <script src="JS/theme.js"></script>
  <script src="JS/render.js"></script>
  <script src="JS/modal.js"></script>
  <script src="JS/form.js"></script>
  <script src="JS/main.js"></script>
</body>
</html>
